<div class="surface-card shadow-1 border-bottom-1 border-300 flex justify-content-center p-3">
    <div class="w-full flex align-items-center justify-content-between" style="max-width: 1200px;">
        
        <div class="flex align-items-center gap-2 cursor-pointer" routerLink="/cursos">
            <i class="pi pi-book text-primary text-2xl"></i>
            <span class="font-bold text-lg text-900">PLATAFORMA EAD</span>
        </div>

        <div class="flex align-items-center gap-3">
            
            <div class="hidden md:flex align-items-center gap-3">
                <a class="text-600 font-medium cursor-pointer no-underline hover:text-primary" routerLink="/cursos">Meus Cursos</a>
                <a class="text-600 font-medium cursor-pointer no-underline hover:text-primary" routerLink="/admin/cursos">Adicionar Curso</a>
            </div>

            <button pButton icon="pi pi-bars" class="md:hidden p-button-text p-button-secondary" (click)="menu.toggle($event)"></button>
            <p-menu #menu [model]="items" [popup]="true"></p-menu>

            
            <button pButton icon="pi pi-sign-out" class="p-button-text p-button-secondary hidden md:flex" (click)="logout()"></button>
            
            <p-avatar image="https://primefaces.org/cdn/primeng/images/demo/avatar/amyelsner.png" shape="circle" size="large"></p-avatar>
        </div>
    </div>
</div>
