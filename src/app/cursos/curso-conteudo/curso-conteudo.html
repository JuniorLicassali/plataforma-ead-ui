<div class="container mt-5">
  <div class="grid">
    <div class="col-12 md:col-8">
      <div class="video-container">
        <!-- <iframe
          [src]="urlVideo | safe"
          (ended)="finalizarAula()"
          width="100%"
          height="450"
          frameborder="0"
          allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
          allowfullscreen
        ></iframe> -->

        <video 
  #videoPlayer
  width="100%" 
  height="450" 
  controls 
  [src]="urlVideo">
  Seu navegador não suporta vídeos.
</video>
      </div>
      <h2 class="mt-3">{{ aulaSelecionada?.titulo }}</h2>

      <div class="hidden md:flex grid gap-3 mt-3">
        <div
          class="col-12 md:col card-descricao border-round-3xl bg-green-50 text-green-700 shadow-1 cursor-pointer p-3"
        >
          <h2 class="mt-0 mb-0 text-base flex align-items-center justify-content-center">
            <i class="pi pi-info-circle mr-2"></i> Descrição
          </h2>
        </div>

        <div
          class="col-12 md:col card-descricao border-round-3xl bg-white border-1 border-200 text-600 cursor-pointer p-3 hover:bg-gray-100 opacity-60 select-none pointer-events-none"
        >
          <h2 class="mt-0 mb-0 text-base text-center">Comentários</h2>
        </div>

        <div
          class="col-12 md:col card-descricao border-round-3xl bg-white border-1 border-200 text-600 cursor-pointer p-3 hover:bg-gray-100 opacity-60 select-none pointer-events-none"
        >
          <h2 class="mt-0 mb-0 text-base text-center">Materiais</h2>
        </div>
      </div>

      <div class="hidden md:flex grid mt-2">
        <div class="col-12 card-descricao border-round-xl p-4 surface-card shadow-1">
          <h2 class="mt-0 text-xl font-bold">Descrição do Vídeo</h2>
          <p class="line-height-3 text-700">{{ aulaSelecionada?.descricao }}</p>
        </div>
      </div>
    </div>

    <div class="col-12 md:col-4">
      <p-accordion [value]="0">
        @for (modulo of modulos; track modulo.id; let i = $index) {
          <p-accordion-panel [value]="i">
            <p-accordion-header>{{ modulo.nome }}</p-accordion-header>
            <p-accordion-content>
              <p-listbox
                [options]="modulo.aulas"
                [(ngModel)]="aulaSelecionada"
                (onChange)="onAulaChange($event)"
                [metaKeySelection]="false"
                class="w-full md:w-56">
                <ng-template #item let-aula>
                  <div class="flex align-items-center gap-2">
                    <i class="pi pi-play-circle" style="color: #6366f1"></i>
                    <span>{{ aula.titulo }}</span>
                  </div>
                </ng-template>
              </p-listbox>
            </p-accordion-content>
          </p-accordion-panel>
        }
      </p-accordion>
    </div>
  </div>
</div>
