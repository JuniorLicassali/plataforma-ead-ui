<div class="container mt-5">
  <div class="grid">
    <div class="col-12 md:col-8">
      <div class="video-container">
        <video #videoPlayer width="100%" height="450" controls [src]="urlVideo">
          Seu navegador não suporta vídeos.
        </video>
      </div>
      <h2 class="mt-3">{{ aulaSelecionada().titulo }}</h2>

      <div class="hidden md:flex grid gap-3 mt-3">
        <div
          class="col-12 md:col card-descricao border-round-3xl bg-green-50 text-green-700 shadow-1 cursor-pointer p-3"
        >
          <h2 class="mt-0 mb-0 text-base flex align-items-center justify-content-center">
            <i class="pi pi-info-circle mr-2"></i> Descrição
          </h2>
        </div>

        <div
          (click)="irParaQuestionario(curso().id)"
          class="col-12 md:col card-descricao border-round-3xl bg-white border-1 border-200 text-600 cursor-pointer p-3 hover:bg-blue-50 hover:text-blue-600 hover:border-blue-300 transition-all transition-duration-200 select-none"
        >
          <h2 class="mt-0 mb-0 text-base text-center">Questionário</h2>
        </div>

        <div
          class="col-12 md:col card-descricao border-round-3xl bg-white border-1 border-200 text-600 cursor-pointer p-3 hover:bg-gray-100 opacity-60 select-none pointer-events-none"
        >
          <h2 class="mt-0 mb-0 text-base text-center">Materiais</h2>
        </div>
      </div>

      <div class="hidden md:flex grid mt-2">
        <div class="col-12 card-descricao border-round-xl p-4 surface-card shadow-1">
          <h2 class="mt-0 text-xl font-bold">Descrição do Vídeo</h2>
          <p class="line-height-3 text-700">{{ aulaSelecionada().descricao }}</p>
        </div>
      </div>
    </div>

    <div class="col-12 md:col-4">
      <p-accordion [value]="activeIndex()">
        @for (modulo of modulos(); track modulo.id; let i = $index) {
          <p-accordion-panel [value]="i">
            <p-accordion-header>{{ modulo.nome }}</p-accordion-header>
            <p-accordion-content>
              <p-listbox 
                scrollHeight="auto"
                [options]="modulo.aulas"
                [(ngModel)]="aulaSelecionada"
                (onChange)="onAulaChange($event)"
                [metaKeySelection]="false"
                class="w-full md:w-56 border-none shadow-none"
              >
                <ng-template #item let-aula>
                  <div
                    class="flex align-items-center gap-3 w-full p-2 border-round-lg transition-colors transition-duration-200"
                    [class.aula-ativa]="aula.id === aulaSelecionada().id"
                  >
                    <i
                      [class]="
                        aula.id === aulaSelecionada().id
                          ? 'pi pi-play-circle text-primary font-bold'
                          : 'pi pi-play-circle text-400'
                      "
                      style="font-size: 1.1rem"
                    ></i>

                    <span
                      class="text-sm"
                      [class.font-bold]="aula.id === aulaSelecionada().id"
                      [class.text-primary]="aula.id === aulaSelecionada().id"
                      [class.text-700]="aula.id !== aulaSelecionada().id"
                    >
                      {{ aula.titulo }}
                    </span>
                  </div>
                </ng-template>
              </p-listbox>
            </p-accordion-content>
          </p-accordion-panel>
        }
      </p-accordion>
    </div>
  </div>
</div>
