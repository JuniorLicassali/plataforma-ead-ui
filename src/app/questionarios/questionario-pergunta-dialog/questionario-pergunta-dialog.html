<p-dialog header="Nova Pergunta" [visible]="true" (onHide)="onCancelar.emit()" [modal]="true" 
    [style]="{ width: '50rem'}" [breakpoints]="{ '640px': '95vw' }">
  <form [formGroup]="formulario" class="flex flex-column gap-4">

    <div class="flex flex-column gap-2">
      <label class="font-bold">Enunciado</label>
      <textarea rows="5" cols="30" pTextarea formControlName="enunciado"></textarea>
    </div>
    <div formArrayName="opcoes" class="flex flex-column gap-3">
      <div class="flex justify-content-between align-items-center">
        <label class="font-bold">Opções</label>
        <p-button label="Add Opção" icon="pi pi-plus" (click)="addOpcao()" [text]="true" />
      </div>

      @for (opt of opcoes.controls; track opt) {
        <div [formGroupName]="$index" class="flex gap-2 align-items-center">
          <!-- <input pInputText formControlName="texto" class="flex-grow-1" placeholder="Resposta..." /> -->
          <textarea rows="5" cols="30" pTextarea formControlName="texto" class="flex-grow-1"></textarea>
          <p-checkbox 
            formControlName="isCorreta" 
            [binary]="true" 
            (onChange)="$event.checked ? selecionarCorreta($index) : null" />
          
          <p-button icon="pi pi-trash" (click)="removerOpcao($index)" severity="danger" [text]="true" />
        </div>
      }
    </div>

    <div class="flex justify-content-end gap-2">
      <p-button label="Cancelar" (click)="onCancelar.emit()" severity="secondary" />
      <p-button label="Salvar" (click)="salvar()" [disabled]="formulario.invalid || !temRespostaCorreta()" />
    </div>
  </form>
</p-dialog>
