<div class="container mt-5 px-4">
  <h2 class="font-bold mb-4 text-900">
    {{ !modoEdicao ? 'NOVO QUESTIONÁRIO' : 'EDIÇÃO DE PERGUNTAS' }}
  </h2>

  <div class="grid">
    @if (!modoEdicao) {
      <p-card>
        <div class="flex flex-column md:flex-row gap-4 align-items-end">
          <div class="flex flex-column gap-2 flex-grow-1">
            <label class="font-bold">Nome do Questionário</label>
            <div class="p-inputgroup">
              <input
                type="text"
                pInputText
                [(ngModel)]="nomeQuestionario"
                placeholder="Ex: Questionário de Java"
                class="w-full"
              />
              <button
                pButton
                icon="pi pi-check"
                label="Criar"
                (click)="criarQuestionario()"
                [disabled]="!nomeQuestionario || !cursoId"
              ></button>
            </div>
          </div>

          <div class="flex flex-column gap-2 min-w-max">
            <label class="font-bold">Curso Alvo</label>
            <p-select
              [options]="cursos()"
              [(ngModel)]="cursoId"
              optionLabel="nome"
              optionValue="id"
              placeholder="Selecione um curso"
              styleClass="w-full md:w-20rem"
            ></p-select>
          </div>
        </div>
      </p-card>
    } @else {
      <div class="fadein animation-duration-500">
        <div class="flex justify-content-between align-items-center mb-4">
          <h2>Perguntas Cadastradas</h2>
          <p-button label="Nova Pergunta" icon="pi pi-plus" (click)="prepararNovaPergunta()" />
        </div>

        <p-card>
          <!-- <p-table [value]="questionario().perguntas" ...> </p-table> -->
          <p-table [value]="questionario().perguntas" [tableStyle]="{ 'min-width': '50rem' }">
            <ng-template #header>
              <tr>
                <th>Enunciado</th>
                <th>Opções</th>
                <th style="width: 5rem">Ações</th>
              </tr>
            </ng-template>
            <ng-template #body let-pergunta let-i="index">
              <tr>
                <td>{{ pergunta.enunciado }}</td>
                <td>{{ pergunta.opcoes.length }}</td>
                <td>
                  <button
                    pButton
                    icon="pi pi-pencil"
                    (click)="prepararEdicao(pergunta)"
                    class="p-button-success"
                  ></button>
                </td>
              </tr>
            </ng-template>
          </p-table>
        </p-card>
        @if (exibirDialog()) {
          <app-pergunta-dialog
            [pergunta]="perguntaParaEnviar()"
            (onSalvar)="
              perguntaParaEnviar() ? salvarEditada($event) : salvarQuestionarioComPerguntas($event)
            "
            (onCancelar)="fecharDialog()"
          />
        }
      </div>
    }
  </div>
</div>
